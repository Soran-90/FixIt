<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>حسابي - FixIt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ===== CSS ===== -->
  <link rel="stylesheet" href="../../css/common/common.css">
  <link rel="stylesheet" href="profile.css">
</head>

<body class="customer-page profile-page">

  <!-- ===== Header ===== -->
  <header class="page-header">
    <h2>👤 حسابي</h2>
    <p class="subtitle">معلوماتك الشخصية وإعدادات الحساب</p>
  </header>

  <!-- ===== Profile Card ===== -->
  <section class="profile-section">

    <div class="profile-card">
      <div class="avatar">👤</div>

      <h3 id="profileName">اسم المستخدم</h3>
      <p id="profileEmail" class="muted">email@example.com</p>
    </div>

  </section>

  <!-- ===== Info Cards ===== -->
  <section class="info-section">

    <div class="info-card">
      <span class="label">📞 رقم الهاتف</span>
      <span class="value" id="profilePhone">—</span>
    </div>

    <div class="info-card">
      <span class="label">🎭 الدور</span>
      <span class="value" id="profileRole">زبون</span>
    </div>

  </section>

  <!-- ===== Actions ===== -->
  <section class="actions-section">
    <button class="btn-primary" id="editProfileBtn">
      ✏️ تعديل المعلومات
    </button>

    <button class="btn-logout" id="logoutBtn">
      🚪 تسجيل الخروج
    </button>
  </section>

  <!-- ===== Bottom Navigation ===== -->
  <nav class="bottom-nav">

    <a href="../home/home.html" class="nav-item">
      <span class="icon">🏠</span>
      <small>الرئيسية</small>
    </a>

    <a href="../orders/orders.html" class="nav-item">
      <span class="icon">📋</span>
      <small>طلباتي</small>
    </a>

    <a href="../search/search.html" class="nav-item">
      <span class="icon">🔍</span>
      <small>بحث</small>
    </a>

    <a href="profile.html" class="nav-item active">
      <span class="icon">👤</span>
      <small>حسابي</small>
    </a>

  </nav>

  <!-- ===== Scripts ===== -->
  <script type="module" src="../../js/auth-guard.js"></script>
  <script type="module" src="profile.js"></script>
  <script src="../../js/bottom-nav-anim.js"></script>

</body>
</html>
