<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>الرئيسية - العامل | FixIt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/common/common.css">
  <link rel="stylesheet" href="home.css">
</head>

<body class="worker-page">

  <!-- Header -->
  <header class="page-header">
    <h2>👋 أهلاً بك</h2>
    <p class="subtitle">لوحة العامل الرئيسية</p>
  </header>

  <!-- Quick Stats -->
  <section class="stats-grid">
    <div class="stat-card">
      <span class="icon">📦</span>
      <p class="value" id="totalOrders">—</p>
      <p class="label">كل الطلبات</p>
    </div>

    <div class="stat-card">
      <span class="icon">⏳</span>
      <p class="value" id="activeOrders">—</p>
      <p class="label">طلبات نشطة</p>
    </div>

    <div class="stat-card">
      <span class="icon">⭐</span>
      <p class="value" id="ratingAvg">—</p>
      <p class="label">التقييم</p>
    </div>
  </section>

  <!-- New Orders -->
  <section class="section">
    <h3 class="section-title">🧑‍🔧 طلبات جديدة</h3>
    <div id="newOrders" class="orders-list">
      <p class="muted">جاري التحميل...</p>
    </div>
  </section>

  <!-- Worker Bottom Nav -->
  <nav class="bottom-nav worker-nav">
    <a href="home.html" class="nav-item active">
      <span class="icon">🏠</span>
      <small>الرئيسية</small>
    </a>

    <a href="../orders/orders.html" class="nav-item">
      <span class="icon">📦</span>
      <small>طلباتي</small>
    </a>

    <a href="../profile/profile.html" class="nav-item">
      <span class="icon">👤</span>
      <small>حسابي</small>
    </a>
  </nav>

  <!-- Scripts -->
  <script type="module" src="../../worker/guard.js"></script>
  <script type="module" src="home.js"></script>
</body>
</html>
